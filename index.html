<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB-AI PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f1f5f9; font-family: -apple-system, sans-serif; }
        .state-neutral { background: #cbd5e1; color: #1e293b; }
        .state-profit { background: #22c55e; color: white; }
        .state-loss { background: #ef4444; color: white; }
        .log-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 6px solid #2563eb; }
        .log-EXPENSE { border-left-color: #ef4444; }
        .btn-log { border-radius: 10px; padding: 12px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container py-3" style="max-width: 450px;">
    <div id="header" class="card border-0 shadow-sm mb-3 state-neutral">
        <div class="card-body text-center py-4">
            <small class="fw-bold opacity-75">TODAY'S NET PROFIT</small>
            <h1 id="netProfit" class="display-4 fw-bold mb-0">$0</h1>
            <p id="statusMsg" class="small mb-0 mt-1 fw-bold">WAKING UP...</p>
        </div>
    </div>

    <div class="card border-0 shadow-sm mb-4" style="border-radius: 15px;">
        <div class="card-body">
            <input id="prodName" class="form-control mb-2 border-0 bg-light" placeholder="Item Name (e.g. Hoodie)">
            <input id="msg" class="form-control mb-3 border-0 bg-light" placeholder="sale 1 15 OR stock 50 10">
            <div class="d-flex gap-2">
                <button onclick="send('sale')" class="btn btn-dark w-100 btn-log">LOG SALE</button>
                <button onclick="send('exp')" class="btn btn-outline-danger w-100 btn-log">EXPENSE</button>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3 px-1">
        <h6 class="fw-bold mb-0">Today's Activity</h6>
        <button onclick="update()" class="btn btn-sm btn-light">Refresh</button>
    </div>
    <div id="history"></div>
</div>

<script>
    const apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') 
                    ? 'http://localhost:3000' : window.location.origin;

    async function update() {
        try {
            const res = await fetch(`${apiBase}/summary`);
            const data = await res.json();
            const profit = data.netProfit || 0;
            
            // 1. Update Header Colors (Tri-State)
            const h = document.getElementById('header');
            const s = document.getElementById('statusMsg');
            if (profit > 0) {
                h.className = "card border-0 shadow-sm mb-3 state-profit";
                s.innerText = "📈 MAKING MONEY TODAY";
            } else if (profit < 0) {
                h.className = "card border-0 shadow-sm mb-3 state-loss";
                s.innerText = "📉 LOSS DETECTED";
            } else {
                h.className = "card border-0 shadow-sm mb-3 state-neutral";
                s.innerText = "NO ACTIVITY YET";
            }
            document.getElementById('netProfit').innerText = `$${profit}`;

            // 2. Update Activity Log
            document.getElementById('history').innerHTML = data.recentSales.map(s => `
                <div class="log-card log-${s.type} shadow-sm d-flex justify-content-between align-items-center">
                    <div>
                        <span class="badge ${s.type==='SALE'?'bg-success':'bg-danger'} mb-1">${s.type}</span>
                        <div class="fw-bold text-uppercase small">${s.product}</div>
                    </div>
                    <div class="h5 mb-0 fw-bold ${s.profit < 0 ? 'text-danger' : 'text-dark'}">
                        ${s.profit >= 0 ? '+' : ''}$${s.profit}
                    </div>
                </div>
            `).join('') || '<p class="text-center text-muted small">Nothing logged today.</p>';
        } catch(e) { console.error(e); }
    }

    async function send(type) {
        const msg = document.getElementById('msg').value;
        const prod = document.getElementById('prodName').value || "General";
        if(!msg) return;

        await fetch(`${apiBase}/message`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({ message: type === 'exp' ? `exp ${msg}` : msg, product: prod })
        });
        document.getElementById('msg').value = "";
        update();
    }
    update();
</script>
</body>
</html>
