<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>IB-AI Dashboard</title>
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="card shadow-sm mb-4">
            <div class="card-body text-center">
                <h2 class="fw-bold text-primary">IB-AI PRO</h2>
                <div id="mainStats" class="row my-3">
                    <div class="col"><h6>Stock: <span id="stockCount">0</span></h6></div>
                    <div class="col"><h6>Profit: <span id="netProfit" class="text-success">$0</span></h6></div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <input id="msg" class="form-control mb-2" placeholder="Ex: stock 100 or 10 5">
                <button onclick="sendMessage()" class="btn btn-primary w-100 mb-3">Send Update</button>
                
                <input type="file" id="photoInput" class="form-control mb-2">
                <button onclick="uploadPhoto()" class="btn btn-outline-secondary w-100">Upload Receipt/Photo</button>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <h5>Recent Activity</h5>
                <ul id="history" class="list-group list-group-flush"></ul>
            </div>
        </div>
    </div>

    <script>
        // This detects if you are on your laptop (localhost) or your phone (IP)
const apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') 
                ? 'http://localhost:3000' 
                : `http://192.168.1.195:3000`;

async function getSummary(){
    try {
        const res = await fetch(`${apiBase}/summary`);
        const data = await res.json();
        document.getElementById('stockCount').innerText = data.stock;
        document.getElementById('netProfit').innerText = "$" + data.netProfit;
        
        let listHTML = "";
        data.recentSales.forEach(s => {
            listHTML += `<li class="list-group-item d-flex justify-content-between">
                <span>${s.units} units</span>
                <span class="fw-bold">$${s.profit}</span>
            </li>`;
        });
        document.getElementById('history').innerHTML = listHTML;
    } catch(e) { console.log("Summary error", e); }
}

async function sendMessage(){
    const msg = document.getElementById('msg').value;
    if(!msg) return;
    
    await fetch(`${apiBase}/message`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({message:msg})
    });
    document.getElementById('msg').value = "";
    getSummary();
}

async function uploadPhoto(){
    const fileInput = document.getElementById('photoInput');
    if(fileInput.files.length === 0) return alert("Select a photo first!");

    const formData = new FormData();
    formData.append('image', fileInput.files[0]);

    const uploadBtn = document.querySelector("button[onclick='uploadPhoto()']");
    uploadBtn.innerText = "⌛ Reading Photo...";
    uploadBtn.disabled = true;

    try {
        // We use a relative path here. If the website is loaded at localhost:3000, 
        // it will automatically send the photo to localhost:3000/upload
        const res = await fetch(`${apiBase}/upload`, { // Make sure these are backticks!
    method: 'POST', 
    body: formData 
});
        
        if (!res.ok) throw new Error(`Server responded with ${res.status}`);
        
        const data = await res.json();
        alert(data.reply); 
    } catch (err) {
        console.error("DETAILED ERROR:", err);
        alert("Upload failed: " + err.message);
    } finally {
        uploadBtn.innerText = "Upload Inventory Photo";
        uploadBtn.disabled = false;
        getSummary();
    }
}

// Start the app immediately
getSummary();
    </script>
</body>
</html>
